# =====================================================================
# Test configuration
# ---------------------------------------------------------------------
# Uses an in-memory H2 database (PostgreSQL compatibility mode) so tests
# such as the @SpringBootTest context-load run without a live PostgreSQL.
# Hibernate builds the schema from the entities; the production Flyway
# migrations are PostgreSQL-specific and are disabled here.
# =====================================================================

product-service.base-url=http://localhost:8081

spring.datasource.url=jdbc:h2:mem:orderservice;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

spring.flyway.enabled=false
